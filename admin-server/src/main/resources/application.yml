server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: admin-server
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/lab_booking?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:200453}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

app:
  security:
    token-header: Authorization
  storage:
    upload-dir: ${APP_UPLOAD_DIR:${user.dir}/uploads}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    key-prefix: ${APP_REDIS_KEY_PREFIX:lab-booking:}
    token-ttl: ${APP_REDIS_TOKEN_TTL:12h}
    cache-ttl: ${APP_REDIS_CACHE_TTL:5m}

